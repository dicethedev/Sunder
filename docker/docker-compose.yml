      - ../config:/config:ro
      - sunder-logs:/var/log/sunder
    networks:
      sunder-net:
        aliases:
          - node3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Node 4 ──────────────────────────────────────────────────────────────────
  node4:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    container_name: sunder-node4
    environment:
      - SUNDER_KEYSTORE=/config/node4.keystore
      - SUNDER_NODE_INDEX=4
      - SUNDER_BIND=0.0.0.0:9000
      - SUNDER_AUDIT_LOG=/var/log/sunder/node4-audit.jsonl
      - RUST_LOG=info
    volumes:
      - ../config:/config:ro
      - sunder-logs:/var/log/sunder
    networks:
      sunder-net:
        aliases:
          - node4
    restart: unless-stopped
