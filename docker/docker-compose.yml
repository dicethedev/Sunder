services:

  # ── Aggregator ──────────────────────────────────────────────────────────────
  # The public-facing API. Receives sign requests, fans out to nodes,
  # assembles the threshold signature.
  aggregator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.aggregator
    container_name: sunder-aggregator
    ports:
      - "8080:8080"
    environment:
      - SUNDER_KEYSTORE=/config/node1.keystore
      - SUNDER_THRESHOLD=3
      - SUNDER_NODES=http://node1:9000,http://node2:9000,http://node3:9000,http://node4:9000,http://node5:9000
      - SUNDER_BIND=0.0.0.0:8080
      - SUNDER_AUDIT_LOG=/var/log/sunder/aggregator-audit.jsonl
      - RUST_LOG=info
    volumes:
      - ../config:/config:ro
      - sunder-logs:/var/log/sunder
    networks:
      - sunder-net
    depends_on:
      - node1
      - node2
      - node3
      - node4
      - node5
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Node 1 ──────────────────────────────────────────────────────────────────
  node1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    container_name: sunder-node1
    environment:
      - SUNDER_KEYSTORE=/config/node1.keystore
      - SUNDER_NODE_INDEX=1
      - SUNDER_BIND=0.0.0.0:9000
      - SUNDER_AUDIT_LOG=/var/log/sunder/node1-audit.jsonl
      - RUST_LOG=info
    volumes:
      - ../config:/config:ro
      - sunder-logs:/var/log/sunder
    networks:
      sunder-net:
        aliases:
          - node1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Node 2 ──────────────────────────────────────────────────────────────────
  node2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
