      - SUNDER_KEYSTORE=/config/node2.keystore
      - SUNDER_NODE_INDEX=2
      - SUNDER_BIND=0.0.0.0:9000
      - SUNDER_AUDIT_LOG=/var/log/sunder/node2-audit.jsonl
      - RUST_LOG=info
    volumes:
      - ../config:/config:ro
      - sunder-logs:/var/log/sunder
    networks:
      sunder-net:
        aliases:
          - node2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Node 3 ──────────────────────────────────────────────────────────────────
  node3:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    container_name: sunder-node3
    environment:
      - SUNDER_KEYSTORE=/config/node3.keystore
      - SUNDER_NODE_INDEX=3
      - SUNDER_BIND=0.0.0.0:9000
      - SUNDER_AUDIT_LOG=/var/log/sunder/node3-audit.jsonl
      - RUST_LOG=info
