  # ── Node 5 ──────────────────────────────────────────────────────────────────
  node5:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    container_name: sunder-node5
    environment:
      - SUNDER_KEYSTORE=/config/node5.keystore
